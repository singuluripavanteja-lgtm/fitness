<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Social Feed — fitnesSHARE</title>
<link rel="stylesheet" href="/css/global.css">
<style>
.feed-grid{display:grid;grid-template-columns:1fr 340px;gap:40px;align-items:start;max-width:1200px;margin:auto;}
.posts-col{display:flex;flex-direction:column;gap:48px;align-items:center;padding:20px 0;}
.post-card{width:360px;background:var(--bg2);border-radius:24px;overflow:hidden;position:relative;border:1px solid var(--card-border);box-shadow:var(--shadow);}
.reels-container{position:relative;width:100%;aspect-ratio:9/16;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.reels-image{width:100%;height:100%;object-fit:cover;}
.reels-actions-right{position:absolute;right:10px;bottom:100px;display:flex;flex-direction:column;gap:18px;align-items:center;z-index:10;}
.reels-action-btn{background:rgba(0,0,0,0.45);border:none;width:44px;height:44px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;cursor:pointer;backdrop-filter:blur(10px);transition:var(--transition);font-size:1.1rem;}
.reels-action-btn:hover{transform:scale(1.1);background:rgba(255,255,255,0.2);}
.reels-action-btn.liked{color:var(--primary);}
.reels-action-count{font-size:0.7rem;font-weight:700;margin-top:2px;text-shadow:0 2px 4px rgba(0,0,0,0.5);}
.reels-info-overlay{position:absolute;bottom:0;left:0;right:0;padding:24px 16px;background:linear-gradient(transparent, rgba(0,0,0,0.9));color:#fff;z-index:5;}
.post-author-link{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff;margin-bottom:10px;}
.comment-side-panel{position:fixed;right:-400px;top:0;bottom:0;width:400px;background:var(--bg3);z-index:2000;box-shadow:-10px 0 30px rgba(0,0,0,0.5);transition:0.4s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;}
.comment-side-panel.open{right:0;}
.comments-header{padding:20px;border-bottom:1px solid var(--card-border);display:flex;justify-content:space-between;align-items:center;}
.comments-list{flex:1;overflow-y:auto;padding:20px;}
.comment-input-wrap{padding:20px;background:var(--bg4);border-top:1px solid var(--card-border);}
@media(max-width:900px){.feed-grid{grid-template-columns:1fr;}.sidebar-col{display:none;}.comment-side-panel{width:100%;right:-100%;}}
</style>
</head>
<body>
<button class="theme-toggle" id="theme-toggle" title="Toggle dark/light mode">
  <span id="theme-toggle-icon">🌙</span>
</button>
<div id="toast-container"></div>
<nav class="navbar">
  <a href="/" class="nav-logo" id="logo-link">fitnesSHARE</a>
  <div class="nav-links">
    <a href="/dashboard" class="nav-link"> Home</a>
    <a href="/workout" class="nav-link"> Workout</a>
    <a href="/diet" class="nav-link"> Diet</a>
    <a href="/social" class="nav-link active"> Social</a>
    <a href="/ai" class="nav-link"> AI Coach</a>
    <a href="/profile" class="nav-link"> Profile</a>
    <a href="/auth" class="btn btn-primary btn-sm" id="nav-auth-btn" style="display:none;">Sign In</a>
  </div>
</nav>
<div class="page">
  <div class="app-layout">
    <aside class="sidebar">
      <a href="/dashboard" class="sidebar-link"><span class="icon"></span>Dashboard</a>
      <a href="/workout" class="sidebar-link"><span class="icon"></span>Workout</a>
      <a href="/diet" class="sidebar-link"><span class="icon"></span>Diet</a>
      <a href="/social" class="sidebar-link active"><span class="icon"></span>Social Feed</a>
      <a href="/ai" class="sidebar-link"><span class="icon"></span>AI Coach</a>
      <a href="/duo" class="sidebar-link"><span class="icon"></span>Duo Streaks</a>
      <a href="/leaderboard" class="sidebar-link"><span class="icon"></span>Leaderboard</a>
      <a href="/profile" class="sidebar-link"><span class="icon"></span>Profile</a>
    </aside>
    <main class="main-content">
      <div style="margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;">
        <h1>📸 Social Feed</h1>
        <div style="display:flex;gap:8px;">
          <button class="tab-btn active" id="feed-btn" onclick="loadFeed('feed')">Following</button>
          <button class="tab-btn" id="explore-btn" onclick="loadFeed('explore')">Explore</button>
        </div>
      </div>
<script>
// Theme toggle logic
const themeToggle = document.getElementById('theme-toggle');
const themeIcon = document.getElementById('theme-toggle-icon');
function setTheme(theme) {
  if (theme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    themeIcon.textContent = '☀️';
    localStorage.setItem('theme', 'light');
  } else {
    document.documentElement.removeAttribute('data-theme');
    themeIcon.textContent = '🌙';
    localStorage.setItem('theme', 'dark');
  }
}
themeToggle.onclick = () => {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  setTheme(isLight ? 'dark' : 'light');
};
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'light') setTheme('light');
</script>
      <div class="feed-grid">
        <div>
          <!-- Create Post -->
          <div class="create-post-card" id="create-post-section">
            <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px;">
              <div id="create-avatar"></div>
              <textarea id="post-caption" class="form-textarea" rows="2" placeholder="Share your workout, meal, or progress… 💪" style="flex:1;min-height:60px;"></textarea>
            </div>
            <img id="post-img-preview" class="post-img-preview" alt="Preview">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
              <div style="display:flex;gap:8px;">
                <label class="btn btn-outline btn-sm" style="cursor:pointer;">
                  📷 Photo
                  <input type="file" id="post-img-input" accept="image/*" style="display:none;" onchange="previewPostImg(this)">
                </label>
                <select id="post-type" class="form-select" style="width:auto;font-size:0.82rem;padding:6px 10px;">
                  <option value="general">General</option>
                  <option value="workout">💪 Workout</option>
                  <option value="meal">🥗 Meal</option>
                  <option value="progress">📈 Progress</option>
                </select>
              </div>
              <button class="btn btn-primary btn-sm" id="post-submit-btn" onclick="createPost()">🚀 Post</button>
            </div>
          </div>

          <!-- Feed -->
          <div id="posts-feed" class="posts-col"><div class="loader"></div></div>
          <button id="load-more-btn" class="btn btn-outline btn-block" style="margin-top:16px;display:none;max-width:480px;margin-left:auto;margin-right:auto;" onclick="loadMore()">Load More</button>
        </div>

        <!-- Sidebar -->
        <div class="sidebar-col">
          <div class="card" style="margin-bottom:16px;">
            <h3 style="margin-bottom:16px;">🏆 Top Streaks</h3>
            <div id="side-leaderboard"><div class="loader"></div></div>
          </div>
          <div class="card">
            <h3 style="margin-bottom:12px;">🔍 Find People</h3>
            <input type="text" id="search-input" class="form-input" placeholder="Search username..." oninput="searchUsers()">
            <div id="search-results" style="margin-top:12px;"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="comment-panel" class="comment-side-panel">
  <div class="comments-header">
    <h3 id="panel-post-id">Comments</h3>
    <button onclick="closeComments()" style="background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;">✕</button>
  </div>
  <div id="panel-comments-list" class="comments-list"></div>
  <div class="comment-input-wrap">
    <div style="display:flex;gap:10px;">
      <input type="text" id="panel-ci" class="form-input" placeholder="Add a comment...">
      <button class="btn btn-primary" id="panel-post-comment-btn">Post</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
const me = getUser();
let currentFeed = me ? 'feed' : 'explore';
let page = 1;

if (!me) {
  document.getElementById('logo-link').href = '/';
  document.getElementById('create-post-section').style.display = 'none';
  document.getElementById('nav-auth-btn').style.display = 'inline-flex';
  document.querySelectorAll('.nav-link').forEach(l => {
    const h = l.getAttribute('href');
    if (h !== '/social' && h !== '/leaderboard') l.style.display = 'none';
  });
  document.querySelectorAll('.sidebar-link').forEach(l => {
    const h = l.getAttribute('href');
    if (h !== '/social' && h !== '/leaderboard') l.style.display = 'none';
  });
} else {
  document.getElementById('logo-link').href = '/dashboard';
  document.getElementById('create-avatar').innerHTML = avatarHTML(me, 38);
}

function previewPostImg(input) {
  const f = input.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = e => { const img = document.getElementById('post-img-preview'); img.src = e.target.result; img.style.display = 'block'; };
  reader.readAsDataURL(f);
}

async function createPost() {
  const caption = document.getElementById('post-caption').value.trim();
  const imgInput = document.getElementById('post-img-input');
  const type = document.getElementById('post-type').value;
  if (!caption && !imgInput.files[0]) return toast('Add a caption or photo', 'warning');
  const btn = document.getElementById('post-submit-btn'); btn.disabled=true; btn.textContent='Posting...';
  try {
    const fd = new FormData();
    fd.append('caption', caption);
    fd.append('type', type);
    if (imgInput.files[0]) fd.append('image', imgInput.files[0]);
    await api('POST', '/posts', fd, true);
    toast('Posted! 🎉', 'success');
    document.getElementById('post-caption').value = '';
    document.getElementById('post-img-preview').style.display='none';
    imgInput.value='';
    page=1; loadFeed(currentFeed);
  } catch(e) { toast(e.message,'error'); }
  btn.disabled=false; btn.textContent='🚀 Post';
}

async function loadFeed(type) {
  currentFeed = type; page = 1;
  document.getElementById('feed-btn').classList.toggle('active', type==='feed');
  document.getElementById('explore-btn').classList.toggle('active', type==='explore');
  document.getElementById('posts-feed').innerHTML = '<div class="loader"></div>';
  try {
    const endpoint = type==='feed' ? '/posts/feed' : '/posts/explore';
    const posts = await api('GET', endpoint+'?page=1&limit=10');
    renderPosts(posts, false);
    document.getElementById('load-more-btn').style.display = posts.length===10?'block':'none';
  } catch(e) { toast('Failed to load feed','error'); }
}

async function loadMore() {
  page++;
  const endpoint = (currentFeed==='feed'?'/posts/feed':'/posts/explore')+`?page=${page}&limit=10`;
  try {
    const posts = await api('GET', endpoint);
    renderPosts(posts, true);
    if (posts.length < 10) document.getElementById('load-more-btn').style.display='none';
  } catch(e) { toast('Failed to load more','error'); }
}

function renderPosts(posts, append) {
  const html = posts.map(p => renderPost(p)).join('');
  if (append) document.getElementById('posts-feed').insertAdjacentHTML('beforeend', html);
  else document.getElementById('posts-feed').innerHTML = html || `<div class="empty-state"><div class="icon">📸</div><p>No posts yet. Follow people or create the first post!</p></div>`;
}

function renderPost(p) {
  const liked = p.likes?.includes(me?._id);
  return `<div class="post-card fade-in" id="post-${p._id}">
    <div class="reels-container">
      ${p.imageUrl ? `<img src="${p.imageUrl}" class="reels-image" alt="Post">` : `<div class="post-image-placeholder">💪</div>`}
      
      <div class="reels-actions-right">
        <div style="display:flex;flex-direction:column;align-items:center;">
          <button class="reels-action-btn ${liked?'liked':''}" id="like-btn-${p._id}" onclick="toggleLike('${p._id}')">❤️</button>
          <span class="reels-action-count">${p.likes?.length||0}</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;">
          <button class="reels-action-btn" onclick="openComments('${p._id}')">💬</button>
          <span class="reels-action-count">${p.comments?.length||0}</span>
        </div>
        <button class="reels-action-btn" onclick="sharePost('${p._id}')">✈️</button>
        ${p.author?._id === me?._id ? `<button class="reels-action-btn" onclick="deletePost('${p._id}')" style="color:var(--red);">🗑️</button>` : ''}
      </div>

      <div class="reels-info-overlay">
        <a href="/profile?id=${p.author?._id}" class="post-author-link">
          ${avatarHTML(p.author, 34)}
          <span style="font-weight:700;font-size:0.95rem;">${p.author?.username}</span>
          ${p.author?.currentStreak > 0 ? `<span class="tag" style="background:var(--gradient-fire);border:none;">🔥 ${p.author.currentStreak}</span>` : ''}
        </a>
        <div style="font-size:0.9rem;margin-bottom:8px;">${p.caption || ''}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <span class="tag" style="background:rgba(255,255,255,0.15);border:none;font-size:0.7rem;">${p.type}</span>
          ${p.tags?.map(t=>`<span style="color:var(--accent);font-size:0.8rem;font-weight:600;">#${t}</span>`).join('') || ''}
        </div>
        <div style="font-size:0.72rem;color:rgba(255,255,255,0.6);margin-top:10px;">${timeAgo(p.createdAt)}</div>
      </div>
    </div>
  </div>`;
}

let activePostId = null;

async function openComments(postId) {
  activePostId = postId;
  const panel = document.getElementById('comment-panel');
  const list = document.getElementById('panel-comments-list');
  list.innerHTML = '<div class="loader"></div>';
  panel.classList.add('open');
  
  try {
    const posts = await api('GET', `/posts/explore?id=${postId}`); // Or a specific endpoint
    // For now we'll find it in our local feed or fetch details
    const post = await api('GET', `/posts/feed`); // This is a placeholder, should be a single post fetch
    // Find the post from our loaded posts or fetch it
    // Let's assume we need to fetch comments specifically if they grow large
    const fullPost = await api('GET', `/posts/feed`); // Simplified for demo
    const p = (await api('GET', '/posts/explore')).find(x => x._id === postId) || (await api('GET', '/posts/feed')).find(x => x._id === postId);
    
    if (p) {
      list.innerHTML = p.comments?.length ? p.comments.map(c=>`
        <div style="display:flex;gap:12px;margin-bottom:20px;">
          <a href="/profile?id=${c.author?._id}">${avatarHTML(c.author, 32)}</a>
          <div style="flex:1;">
            <div style="font-size:0.88rem;"><a href="/profile?id=${c.author?._id}" style="font-weight:700;text-decoration:none;color:var(--text);">${c.author?.username}</a> ${c.text}</div>
            <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;">${timeAgo(c.createdAt)}</div>
          </div>
        </div>`).join('') : '<div class="empty-state">No comments yet. Be the first!</div>';
    }
    
    document.getElementById('panel-post-comment-btn').onclick = () => postComment(postId);
  } catch(e) { list.innerHTML = 'Failed to load comments.'; }
}

function closeComments() {
  document.getElementById('comment-panel').classList.remove('open');
  activePostId = null;
}

function sharePost(id) {
  const url = `${window.location.origin}/social?id=${id}`;
  navigator.clipboard.writeText(url).then(() => {
    toast('Post link copied to clipboard! ✈️', 'success');
  }).catch(() => {
    toast('Failed to copy link', 'error');
  });
}

async function postComment(id) {
  const input = document.getElementById('panel-ci');
  const text = input.value.trim(); if (!text) return;
  try {
    await api('POST', `/posts/${id}/comment`, { text });
    input.value = '';
    toast('Comment posted!','success');
    openComments(id); // Refresh
    loadFeed(currentFeed); // Refresh main feed count
  } catch(e) { toast(e.message,'error'); }
}

async function toggleLike(id) {
  try {
    const r = await api('POST', `/posts/${id}/like`);
    const btn = document.getElementById(`like-btn-${id}`);
    btn.innerHTML = `❤️ ${r.likeCount}`;
    btn.classList.toggle('liked', r.liked);
  } catch(e) { toast(e.message,'error'); }
}

function toggleComments(id) {
  const el = document.getElementById(`comments-${id}`);
  el.style.display = el.style.display==='none' ? 'block' : 'none';
}

async function postComment(id) {
  const input = document.getElementById(`ci-${id}`);
  const text = input.value.trim(); if (!text) return;
  try {
    await api('POST', `/posts/${id}/comment`, { text });
    input.value = '';
    toast('Comment posted!','success');
    loadFeed(currentFeed);
  } catch(e) { toast(e.message,'error'); }
}

async function deletePost(id) {
  if (!confirm('Delete this post?')) return;
  try {
    await api('DELETE', `/posts/${id}`);
    document.getElementById(`post-${id}`)?.remove();
    toast('Post deleted','info');
  } catch(e) { toast(e.message,'error'); }
}

async function loadSideLeaderboard() {
  try {
    const top = await api('GET', '/users/leaderboard');
    document.getElementById('side-leaderboard').innerHTML = top.slice(0,5).map((u,i)=>`
      <a href="/profile?id=${u._id}" class="leaderboard-item" style="padding:10px;margin-bottom:6px;text-decoration:none;">
        <span class="leaderboard-rank ${i<3?'top':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</span>
        ${avatarHTML(u,30)}
        <div style="flex:1;"><div style="font-size:0.85rem;font-weight:600;">${u.username}</div></div>
        <div style="font-size:0.85rem;font-weight:700;color:var(--fire);">🔥${u.currentStreak}</div>
      </a>`).join('');
  } catch(e) {}
}

let searchTimer;
async function searchUsers() {
  clearTimeout(searchTimer);
  const q = document.getElementById('search-input').value.trim();
  if (!q) { document.getElementById('search-results').innerHTML=''; return; }
  searchTimer = setTimeout(async () => {
    try {
      const users = await api('GET', `/users/search?q=${encodeURIComponent(q)}`);
      document.getElementById('search-results').innerHTML = users.map(u=>`
        <a href="/profile?id=${u._id}" style="display:flex;align-items:center;gap:10px;padding:8px 0;text-decoration:none;color:var(--text);">
          ${avatarHTML(u,32)}
          <div><div style="font-size:0.85rem;font-weight:600;">${u.username}</div><div style="font-size:0.75rem;color:var(--text-muted);">🔥${u.currentStreak} streak</div></div>
        </a>`).join('') || '<div class="text-muted" style="font-size:0.85rem;">No users found</div>';
    } catch(e) {}
  }, 400);
}

loadFeed('feed');
loadSideLeaderboard();
</script>
</body>
</html>
