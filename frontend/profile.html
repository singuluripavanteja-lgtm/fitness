<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Profile — fitnesSHARE</title>
<link rel="stylesheet" href="/css/global.css">
<style>
.profile-container{max-width:935px;margin:auto;background:var(--bg2);border:1px solid var(--card-border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);}
.profile-cover{height:200px;background:var(--gradient-cool);position:relative;background-image:url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop');background-size:cover;background-position:center;}
.profile-cover::after{content:"";position:absolute;inset:0;background:linear-gradient(transparent, rgba(0,0,0,0.4));}
.profile-header-wrap{padding:0 40px 40px;position:relative;margin-top:-75px;z-index:10;}
.profile-header{display:grid;grid-template-columns:150px 1fr;gap:40px;align-items:center;max-width:900px;margin:auto;}
.profile-left{display:flex;flex-direction:column;align-items:center;gap:12px;}
.profile-avatar-wrap{width:150px;height:150px;border-radius:50%;padding:4px;background:var(--gradient);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
.profile-avatar-wrap .avatar-img, .profile-avatar-wrap .avatar-placeholder{width:142px;height:142px;border:5px solid var(--bg2);border-radius:50%;}
.profile-info{display:flex;flex-direction:column;gap:8px;padding-bottom:10px;}
.profile-name-row{display:flex;align-items:center;justify-content:space-between;width:100%;}
.profile-name-row h1{font-family:'Barlow Condensed',sans-serif;font-size:2.4rem;font-weight:900;margin:0;letter-spacing:-0.02em;color:#fff;}
.profile-stats-row{display:flex;gap:32px;margin:8px 0;}
.profile-stat-item{text-align:left;}
.profile-stat-val{font-size:1.15rem;font-weight:800;display:inline;color:#fff;}
.profile-stat-lbl{font-size:0.95rem;color:var(--text-dim);margin-left:5px;text-transform:lowercase;}
.profile-bio{font-size:0.95rem;line-height:1.5;margin:4px 0;color:var(--text-muted);max-width:550px;}
.profile-grid-tabs{border-top:1px solid var(--card-border);display:flex;justify-content:center;gap:60px;background:rgba(255,255,255,0.02);backdrop-filter:blur(10px);}
.grid-tab{background:none;border:none;color:var(--text-dim);padding:18px 0;font-size:0.85rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;cursor:pointer;display:flex;align-items:center;gap:8px;border-top:2px solid transparent;margin-top:-2px;transition:var(--transition);}
.grid-tab:hover{color:#fff;}
.grid-tab.active{color:var(--primary);border-top-color:var(--primary);}
.insta-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:2px;padding:2px;}
.insta-grid-item{aspect-ratio:1/1;background:var(--bg3);overflow:hidden;cursor:pointer;position:relative;}
.insta-grid-item img{width:100%;height:100%;object-fit:cover;transition:0.5s cubic-bezier(0.4,0,0.2,1);}
.insta-grid-item:hover img{transform:scale(1.1);filter:brightness(0.6);}
.insta-grid-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;gap:20px;opacity:0;transition:0.3s;color:#fff;font-size:1.1rem;font-weight:800;}
.avatar-placeholder{
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--gradient);
  color:#fff;
  font-weight:800;
  border-radius:50%;
  text-transform:uppercase;
  user-select:none;
}
.avatar-img{
  object-fit:cover;
  border-radius:50%;
}
@media(max-width:750px){
  .profile-header{grid-template-columns:1fr;text-align:center;justify-items:center;gap:20px;margin-top:-60px;}
  .profile-avatar-wrap{width:120px;height:120px;}
  .profile-avatar-wrap .avatar-img{width:112px;height:112px;}
  .profile-stats-row{justify-content:center;gap:20px;}
  .profile-name-row{justify-content:center;}
  .profile-header-wrap{padding:0 20px 20px;}
}
</style>
</head>
<body>
<button class="theme-toggle" id="theme-toggle" title="Toggle dark/light mode">
  <span id="theme-toggle-icon">🌙</span>
</button>
<div id="toast-container"></div>
<nav class="navbar">
  <a href="/" class="nav-logo" id="logo-link">fitnesSHARE</a>
  <div class="nav-links">
    <a href="/dashboard" class="nav-link"> Home</a>
    <a href="/workout" class="nav-link"> Workout</a>
    <a href="/diet" class="nav-link"> Diet</a>
    <a href="/social" class="nav-link"> Social</a>
    <a href="/ai" class="nav-link"> AI Coach</a>
    <a href="/profile" class="nav-link active"> Profile</a>
    <a href="/auth" class="btn btn-primary btn-sm" id="nav-auth-btn" style="display:none;">Sign In</a>
  </div>
</nav>

<div class="page">
  <div class="app-layout">
    <aside class="sidebar">
      <a href="/dashboard" class="sidebar-link"><span class="icon"></span>Dashboard</a>
      <a href="/workout" class="sidebar-link"><span class="icon"></span>Workout</a>
      <a href="/diet" class="sidebar-link"><span class="icon"></span>Diet</a>
      <a href="/social" class="sidebar-link"><span class="icon"></span>Social Feed</a>
      <a href="/ai" class="sidebar-link"><span class="icon"></span>AI Coach</a>
      <a href="/duo" class="sidebar-link"><span class="icon"></span>Duo Streaks</a>
      <a href="/leaderboard" class="sidebar-link"><span class="icon"></span>Leaderboard</a>
      <a href="/profile" class="sidebar-link active"><span class="icon"></span>Profile</a>
    </aside>
    
    <main class="main-content">
      <div class="profile-container fade-in">
        <div class="profile-cover"></div>
        <div class="profile-header-wrap">
          <div id="profile-content">
            <div class="loader"></div>
          </div>
        </div>
        
        <div class="profile-grid-tabs">
          <button class="grid-tab active" id="tab-posts" onclick="showTab('posts')">📸 Posts</button>
          <button class="grid-tab" id="tab-stats" onclick="showTab('stats')">📈 Stats</button>
          <button class="grid-tab" id="tab-milestones" onclick="showTab('milestones')">🏅 Awards</button>
        </div>
        
        <div id="pane-posts">
          <div id="user-posts" class="insta-grid">
            <div class="loader"></div>
          </div>
        </div>
        
        <div id="pane-stats" style="display:none; padding:30px;">
          <div class="card" style="margin-bottom:24px;">
            <h2 style="margin-bottom:20px;">🏆 Personal Records</h2>
            <div id="pr-list" class="pr-grid">
              <div class="loader"></div>
            </div>
          </div>
          <div class="card">
            <h2 style="margin-bottom:20px;">🗓️ Activity Summary</h2>
            <div id="activity-summary">
              <p class="text-muted">Consistent tracking is the key to progress. Keep logging!</p>
            </div>
          </div>
        </div>
        
        <div id="pane-milestones" style="display:none; padding:30px;">
          <div class="card">
            <h2 style="margin-bottom:20px;">🏅 Achieved Awards</h2>
            <div id="milestones-list" class="milestone-list" style="display:flex;gap:10px;flex-wrap:wrap;">
              <div class="loader"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<script>
// Theme toggle logic
const themeToggle = document.getElementById('theme-toggle');
const themeIcon = document.getElementById('theme-toggle-icon');
function setTheme(theme) {
  if (theme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    themeIcon.textContent = '☀️';
    localStorage.setItem('theme', 'light');
  } else {
    document.documentElement.removeAttribute('data-theme');
    themeIcon.textContent = '🌙';
    localStorage.setItem('theme', 'dark');
  }
}
themeToggle.onclick = () => {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  setTheme(isLight ? 'dark' : 'light');
};
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'light') setTheme('light');
</script>
<!-- Edit Profile Modal -->
<div id="edit-modal" style="display:none;" class="modal-overlay" onclick="if(event.target===this)closeEditModal()">
  <div class="modal">
    <div class="modal-header">
      <h2>👤 Edit Profile</h2>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Cover Photo</label>
      <input type="file" id="edit-cover" class="form-input" accept="image/*">
    </div>
    <div class="form-group">
      <label class="form-label">Avatar</label>
      <input type="file" id="edit-avatar" class="form-input" accept="image/*">
    </div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" id="edit-username" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">Bio</label>
      <textarea id="edit-bio" class="form-textarea" maxlength="300"></textarea>
    </div>
    <div class="form-group" style="flex-direction:row; align-items:center; gap:10px;">
      <input type="checkbox" id="edit-public" style="width:18px; height:18px;">
      <label class="form-label" style="margin:0;">Public Profile</label>
    </div>
    <button class="btn btn-primary btn-block" style="margin-top:20px;" onclick="saveProfile()">Save Changes</button>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
const currentUser = getUser();
const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get('id') || currentUser?._id;

if (!currentUser && !urlParams.get('id')) {
  window.location.href = '/auth';
}

if (!currentUser) {
  document.getElementById('logo-link').href = '/';
  document.getElementById('nav-auth-btn').style.display = 'inline-flex';
  document.querySelectorAll('.nav-link').forEach(l => {
    const h = l.getAttribute('href');
    if (h !== '/social' && h !== '/leaderboard') l.style.display = 'none';
  });
  document.querySelectorAll('.sidebar-link').forEach(l => {
    const h = l.getAttribute('href');
    if (h !== '/social' && h !== '/leaderboard') l.style.display = 'none';
  });
} else {
  document.getElementById('logo-link').href = '/dashboard';
}

const isOwnProfile = currentUser && userId === currentUser._id;

async function loadProfile() {
  try {
    const user = await api('GET', `/users/${userId}`);
    const me = currentUser ? (isOwnProfile ? user : await api('GET', '/users/me')) : null;
    
    const isFollowing = !isOwnProfile && me?.following?.includes(userId);
    
    const coverEl = document.querySelector('.profile-cover');
    if (user.coverPhoto) coverEl.style.backgroundImage = `url('${user.coverPhoto}')`;

    document.getElementById('profile-content').innerHTML = `
      <div class="profile-header fade-in">
        <div class="profile-left">
          <div class="profile-avatar-wrap">${avatarHTML(user, 142, 'avatar-img')}</div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.1rem;color:var(--primary);margin-top:5px;">@${user.username}</div>
        </div>
        
        <div class="profile-info">
          <div class="profile-name-row">
            <h1>${user.username}</h1>
            ${isOwnProfile ? 
              `<button class="btn btn-outline btn-sm" onclick="showEditModal()">⚙️ Edit Profile</button>` : 
              `<button class="btn ${isFollowing?'btn-outline':'btn-primary'} btn-sm" onclick="toggleFollow()">${isFollowing?'Unfollow':'Follow'}</button>`
            }
          </div>
          
          <div class="profile-stats-row">
            <div class="profile-stat-item"><span class="profile-stat-val">${user.followers?.length || 0}</span><span class="profile-stat-lbl">followers</span></div>
            <div class="profile-stat-item"><span class="profile-stat-val">${user.following?.length || 0}</span><span class="profile-stat-lbl">following</span></div>
            <div class="profile-stat-item"><span class="profile-stat-val">🔥 ${user.currentStreak || 0}</span><span class="profile-stat-lbl">streak</span></div>
          </div>
          
          <p class="profile-bio">${user.bio || 'Dedicated to the gainz. 💪'}</p>
        </div>
      </div>
    `;
    
    // Load PRs
    const prCont = document.getElementById('pr-list');
    if (user.personalRecords?.length) {
      prCont.innerHTML = user.personalRecords.map(pr => `
        <div class="pr-card">
          <span class="pr-val">${pr.weight}${pr.unit || 'lbs'}</span>
          <span class="pr-name">${pr.exercise}</span>
          <span class="pr-date">${formatDate(pr.date)}</span>
        </div>
      `).join('');
    } else {
      prCont.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><p>No personal records yet.</p></div>';
    }
    
    // Load Milestones / Badges
    const mCont = document.getElementById('milestones-list');
    let awardsHtml = '';
    
    if (user.badges?.length) {
      awardsHtml += user.badges.map(b => `
        <div class="stat-card" style="text-align:center; padding:15px; width:100px;">
          <div style="font-size:2rem; margin-bottom:5px;">${b.icon}</div>
          <div style="font-size:0.75rem; font-weight:700;">${b.name}</div>
        </div>
      `).join('');
    }
    
    if (user.milestonesAchieved?.length) {
      awardsHtml += user.milestonesAchieved.map(m => `<span class="milestone-badge" style="padding:10px 18px; font-size:0.9rem;">${m}</span>`).join('');
    }

    if (!awardsHtml) {
      mCont.innerHTML = '<div class="empty-state"><p>No awards earned yet. Keep training!</p></div>';
    } else {
      mCont.innerHTML = awardsHtml;
    }

    // Add XP/Level to profile header
    const statsRow = document.querySelector('.profile-stats-row');
    const levelItem = document.createElement('div');
    levelItem.className = 'profile-stat-item';
    levelItem.innerHTML = `<span class="profile-stat-val">Lvl ${user.level || 1}</span><span class="profile-stat-lbl">level</span>`;
    statsRow.appendChild(levelItem);
    
    // Load Posts
    loadUserPosts();
    
    // Populate edit modal
    if (isOwnProfile) {
      document.getElementById('edit-username').value = user.username;
      document.getElementById('edit-bio').value = user.bio || '';
      document.getElementById('edit-public').checked = user.isPublic;
    }
    
  } catch (e) {
    document.getElementById('profile-content').innerHTML = `<div class="empty-state"><div class="icon">❌</div><p>${e.message}</p></div>`;
  }
}

async function loadUserPosts() {
  try {
    const posts = await api('GET', `/posts/user/${userId}`);
    const cont = document.getElementById('user-posts');
    if (posts.length) {
      cont.innerHTML = posts.map(p => `
        <div class="insta-grid-item fade-in" onclick="window.location.href='/social?id=${p._id}'">
          ${p.imageUrl ? `<img src="${p.imageUrl}" alt="Post">` : `<div class="post-image-placeholder" style="height:100%;">💪</div>`}
          <div class="insta-grid-overlay">
            <span>❤️ ${p.likes?.length || 0}</span>
            <span>💬 ${p.comments?.length || 0}</span>
          </div>
        </div>
      `).join('');
    } else {
      cont.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><p>No posts yet.</p></div>';
    }
  } catch (e) {
    document.getElementById('user-posts').innerHTML = '<p>Failed to load posts.</p>';
  }
}

async function toggleFollow() {
  try {
    const r = await api('POST', `/users/${userId}/follow`);
    toast(r.message, 'success');
    loadProfile();
  } catch (e) { toast(e.message, 'error'); }
}

function showEditModal() { document.getElementById('edit-modal').style.display = 'flex'; }
function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }

async function saveProfile() {
  const bio = document.getElementById('edit-bio').value.trim();
  const username = document.getElementById('edit-username').value.trim();
  const isPublic = document.getElementById('edit-public').checked;
  const avatarFile = document.getElementById('edit-avatar').files[0];
  const coverFile = document.getElementById('edit-cover').files[0];
  
  const fd = new FormData();
  fd.append('bio', bio);
  fd.append('username', username);
  fd.append('isPublic', isPublic);
  if (avatarFile) fd.append('avatar', avatarFile);
  if (coverFile) fd.append('coverPhoto', coverFile);
  
  try {
    const updatedUser = await api('PUT', '/users/me', fd, true);
    setAuth(getToken(), updatedUser);
    toast('Profile updated!', 'success');
    closeEditModal();
    loadProfile();
  } catch (e) { toast(e.message, 'error'); }
}

function showTab(tab) {
  ['posts', 'stats', 'milestones'].forEach(t => {
    document.getElementById(`pane-${t}`).style.display = t === tab ? 'block' : 'none';
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
  });
}

loadProfile();
</script>
</body>
</html>
