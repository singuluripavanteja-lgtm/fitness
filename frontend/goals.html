<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Goals & Milestones — fitnesSHARE</title>
  <link rel="stylesheet" href="/css/global.css">
  <style>
    .goal-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 20px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .goal-card:hover { transform: translateY(-4px); border-color: var(--primary); }
    .goal-card.completed { border-color: var(--green); }
    .goal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
    .goal-title { font-size: 1.25rem; font-weight: 800; }
    .goal-deadline { font-size: 0.85rem; color: var(--text-muted); }
    .milestone-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.95rem;
    }
    .milestone-item:last-child { border-bottom: none; }
    .milestone-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .milestone-check.checked { background: var(--primary); border-color: var(--primary); }
    .celebration-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .confetti { font-size: 4rem; margin-bottom: 20px; animation: bounce 1s infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/dashboard" class="nav-logo">fitnesSHARE</a>
    <div class="nav-links">
      <a href="/dashboard" class="nav-link"> Home</a>
      <a href="/workout" class="nav-link"> Workout</a>
      <a href="/diet" class="nav-link"> Diet</a>
      <a href="/social" class="nav-link"> Social</a>
      <a href="/ai" class="nav-link"> AI Coach</a>
      <a href="/profile" class="nav-link" id="nav-avatar-link"> Profile</a>
    </div>
  </nav>

  <div class="page">
    <div class="app-layout">
      <aside class="sidebar">
        <a href="/dashboard" class="sidebar-link"><span class="icon">🏠</span>Dashboard</a>
        <a href="/analytics" class="sidebar-link"><span class="icon">📊</span>Analytics</a>
        <a href="/goals" class="sidebar-link active"><span class="icon">🎯</span>Goals</a>
        <a href="/workout" class="sidebar-link"><span class="icon">💪</span>Workout</a>
        <a href="/diet" class="sidebar-link"><span class="icon">🥗</span>Diet</a>
        <a href="/social" class="sidebar-link"><span class="icon">📱</span>Social Feed</a>
        <a href="/leaderboard" class="sidebar-link"><span class="icon">🏆</span>Leaderboard</a>
      </aside>

      <main class="main-content">
        <div class="section-header">
          <h1>My Fitness Goals</h1>
          <button onclick="openGoalModal()" class="btn btn-primary">+ Set New Goal</button>
        </div>

        <div id="goals-list">
          <div class="loader"></div>
        </div>

        <!-- Add Goal Modal (Simple for now) -->
        <div id="goal-modal" class="modal" style="display:none;">
          <div class="modal-content">
            <h3>Set a New Fitness Goal</h3>
            <form id="goal-form" style="margin-top:20px;">
              <div class="form-group">
                <label>Goal Title</label>
                <input type="text" id="goal-title" class="form-control" placeholder="e.g., Run 5K in 30 mins" required>
              </div>
              <div class="grid-2" style="gap:15px;">
                <div class="form-group">
                  <label>Target Value</label>
                  <input type="number" id="goal-target" class="form-control" placeholder="10">
                </div>
                <div class="form-group">
                  <label>Unit</label>
                  <input type="text" id="goal-unit" class="form-control" placeholder="lbs / miles">
                </div>
              </div>
              <div class="form-group">
                <label>Deadline</label>
                <input type="date" id="goal-deadline" class="form-control">
              </div>
              <div class="form-group">
                <label>Milestones (one per line)</label>
                <textarea id="goal-milestones" class="form-control" rows="3" placeholder="Milestone 1&#10;Milestone 2"></textarea>
              </div>
              <div style="display:flex; gap:10px; margin-top:20px;">
                <button type="submit" class="btn btn-primary flex-1">Create Goal</button>
                <button type="button" onclick="closeGoalModal()" class="btn btn-outline">Cancel</button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="celebration-overlay" class="celebration-overlay" onclick="this.style.display='none'">
    <div class="confetti">🎉🏆✨</div>
    <h2 style="font-size:2.5rem; font-weight:900; color:var(--primary-light);">GOAL ACHIEVED!</h2>
    <p style="font-size:1.2rem; margin-top:10px;">You are unstoppable. Keep pushing!</p>
    <button class="btn btn-primary" style="margin-top:30px;">AWESOME!</button>
  </div>

  <script src="/js/api.js"></script>
  <script>
    requireAuth();

    async function loadGoals() {
      try {
        const goals = await api('GET', '/goals');
        const list = document.getElementById('goals-list');
        
        if (goals.length === 0) {
          list.innerHTML = `
            <div class="empty-state" style="padding:40px;">
              <div class="icon" style="font-size:3rem;">🎯</div>
              <h2>No goals set yet</h2>
              <p>Setting specific goals is the first step to success.</p>
              <button onclick="openGoalModal()" class="btn btn-primary" style="margin-top:20px;">Set My First Goal</button>
            </div>`;
          return;
        }

        list.innerHTML = goals.map(g => {
          const pct = g.targetValue ? Math.min(100, Math.round((g.currentValue / g.targetValue) * 100)) : 0;
          return `
            <div class="goal-card ${g.status === 'completed' ? 'completed' : ''}">
              <div class="goal-header">
                <div>
                  <div class="goal-title">${g.title}</div>
                  <div class="goal-deadline">${g.deadline ? `Due by ${new Date(g.deadline).toLocaleDateString()}` : 'No deadline'}</div>
                </div>
                <div style="text-align:right;">
                  <div style="font-weight:900; font-size:1.4rem; color:var(--primary);">${g.currentValue} / ${g.targetValue || '--'} ${g.unit || ''}</div>
                  <div style="font-size:0.8rem; color:var(--text-muted);">${pct}% completed</div>
                </div>
              </div>
              
              <div class="progress-bar-wrap" style="height:10px; margin-bottom:20px;">
                <div class="progress-bar" style="width:${pct}%;"></div>
              </div>

              <div class="milestones">
                <div style="font-weight:700; font-size:0.9rem; margin-bottom:10px; color:var(--text-muted);">MILESTONES</div>
                ${g.milestones.map((m, idx) => `
                  <div class="milestone-item">
                    <div class="milestone-check ${m.isCompleted ? 'checked' : ''}" onclick="toggleMilestone('${g._id}', ${idx}, ${!m.isCompleted})">
                      ${m.isCompleted ? '✓' : ''}
                    </div>
                    <span style="${m.isCompleted ? 'text-decoration:line-through; color:var(--text-muted);' : ''}">${m.title}</span>
                  </div>
                `).join('')}
              </div>

              <div style="margin-top:20px; display:flex; gap:10px;">
                <button onclick="updateGoalProgress('${g._id}', ${g.currentValue + 1})" class="btn btn-outline btn-sm">+1 Progress</button>
                <button onclick="deleteGoal('${g._id}')" class="btn btn-outline btn-sm" style="color:var(--red);">Delete</button>
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error(err);
      }
    }

    function openGoalModal() { document.getElementById('goal-modal').style.display = 'flex'; }
    function closeGoalModal() { document.getElementById('goal-modal').style.display = 'none'; }

    document.getElementById('goal-form').onsubmit = async (e) => {
      e.preventDefault();
      const payload = {
        title: document.getElementById('goal-title').value,
        targetValue: document.getElementById('goal-target').value,
        unit: document.getElementById('goal-unit').value,
        deadline: document.getElementById('goal-deadline').value,
        milestones: document.getElementById('goal-milestones').value.split('\n').filter(l => l.trim())
      };
      
      try {
        await api('POST', '/goals', payload);
        showToast('Goal created!', 'success');
        closeGoalModal();
        loadGoals();
        e.target.reset();
      } catch (err) {
        showToast('Error creating goal', 'error');
      }
    };

    async function toggleMilestone(goalId, milestoneIndex, isCompleted) {
        try {
            const goals = await api('GET', '/goals');
            const goal = goals.find(g => g._id === goalId);
            goal.milestones[milestoneIndex].isCompleted = isCompleted;
            await api('PUT', `/goals/${goalId}`, { milestones: goal.milestones });
            loadGoals();
        } catch (err) { console.error(err); }
    }

    async function updateGoalProgress(id, newVal) {
        try {
            const res = await api('PUT', `/goals/${id}`, { currentValue: newVal });
            // Check if goal just became completed
            const updatedGoal = res.find(g => g._id === id);
            if (updatedGoal.status === 'completed') {
                document.getElementById('celebration-overlay').style.display = 'flex';
            }
            loadGoals();
        } catch (err) { console.error(err); }
    }

    async function deleteGoal(id) {
        if (!confirm('Are you sure you want to delete this goal?')) return;
        try {
            await api('DELETE', `/goals/${id}`);
            loadGoals();
        } catch (err) { console.error(err); }
    }

    loadGoals();
  </script>
</body>
</html>
